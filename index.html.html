<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Task System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c1f3f;--navy2:#142d58;--navy3:#1e3f7a;
  --blue:#2563eb;--blue2:#3b82f6;--blue3:#60a5fa;
  --bg:#f0f4fa;--bg2:#e8edf7;--card:#ffffff;
  --border:#dde4f0;--border2:#c8d2e8;
  --text:#0f1d35;--text2:#4a5878;--text3:#8896b0;
  --low:#16a34a;--lowbg:#dcfce7;--lowborder:#86efac;
  --med:#b45309;--medbg:#fef3c7;--medborder:#fcd34d;
  --high:#c2410c;--highbg:#ffedd5;--highborder:#fdba74;
  --crit:#dc2626;--critbg:#fee2e2;--critborder:#fca5a5;
  --done:#15803d;--donebg:#dcfce7;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(12,31,63,.07),0 4px 12px rgba(12,31,63,.05);
  --shadow-md:0 4px 16px rgba(12,31,63,.1),0 1px 4px rgba(12,31,63,.06);
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:inherit}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:24px}

.sidebar-head{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand{display:flex;align-items:center;gap:11px}
.brand-icon{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;letter-spacing:-1px;flex-shrink:0}
.brand-name{color:#fff;font-weight:600;font-size:15px}
.brand-ver{color:rgba(255,255,255,.35);font-size:10px;font-family:'DM Mono',monospace;margin-top:1px}
.nav{padding:14px 10px;flex:1;overflow-y:auto}
.nav-group{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase;padding:10px 10px 4px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:var(--radius-sm);border:none;background:none;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(37,99,235,.3);color:#fff}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--blue2);border-radius:2px}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.75}
.nav-item.active svg,.nav-item:hover svg{opacity:1}
.nav-item.disabled{opacity:.35;cursor:default;pointer-events:none}
.nav-foot{padding:12px 10px;border-top:1px solid rgba(255,255,255,.08)}
.coming-tag{display:inline-flex;align-items:center;background:rgba(124,58,237,.25);color:#c4b5fd;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;margin-left:auto}

.topbar{height:58px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:16px;font-weight:600;color:var(--text)}
.mvp-badge{background:#ede9fe;color:#7c3aed;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:8px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.3)}
.btn-secondary{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg);border-color:var(--border2)}
.btn-sm{padding:6px 12px;font-size:12px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow)}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:500;margin-bottom:4px}
.stat-val{font-size:30px;font-weight:600;color:var(--text);line-height:1;font-family:'DM Mono',monospace}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-crit .stat-val{color:var(--crit)}
.stat-ok .stat-val{color:var(--done)}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.bar-lbl{font-size:12px;color:var(--text2);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-n{font-size:11px;color:var(--text2);width:20px;text-align:right;font-family:'DM Mono',monospace;font-weight:500}
.prio-chips{display:flex;gap:10px;flex-wrap:wrap}
.prio-chip{flex:1;min-width:90px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px}
.prio-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prio-chip-n{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.prio-chip-l{font-size:11px;color:var(--text3)}

.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;min-height:calc(100vh - 140px)}
.kanban-col{width:276px;min-width:276px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;max-height:calc(100vh - 148px)}
.col-head{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.col-head-l{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px}
.col-pip{width:8px;height:8px;border-radius:50%}
.col-cnt{background:var(--border);color:var(--text3);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;font-family:'DM Mono',monospace}
.col-cards{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.col-cards.drag-over{background:rgba(37,99,235,.05);border-radius:8px}
.col-add{margin:6px 10px 10px;padding:8px;border:1px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:12px;color:var(--text3);transition:all .15s;width:calc(100% - 20px)}
.col-add:hover{border-color:var(--blue2);color:var(--blue);background:rgba(37,99,235,.04)}

.task-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 13px;cursor:grab;transition:all .15s;position:relative}
.task-card:active{cursor:grabbing}
.task-card:hover{border-color:var(--blue3);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.task-card.dragging{opacity:.4;transform:rotate(1.5deg) scale(.98)}
.task-card-actions{position:absolute;top:9px;right:9px;display:none;gap:4px}
.task-card:hover .task-card-actions{display:flex}
.card-act-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);transition:all .1s}
.card-act-btn:hover{background:var(--bg);color:var(--text)}
.card-act-btn.del:hover{background:#fee2e2;color:var(--crit);border-color:#fca5a5}
.task-prio-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;margin-bottom:8px;letter-spacing:.2px}
.task-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.4;padding-right:50px}
.task-desc{font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.task-assignee{display:flex;align-items:center;gap:6px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0;font-size:10px}
.avatar-sm{width:22px;height:22px;font-size:9px}
.avatar-md{width:32px;height:32px;font-size:12px}
.avatar-lg{width:40px;height:40px;font-size:14px}
.task-due{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.task-due.overdue{color:var(--crit);font-weight:500}
.col-empty{text-align:center;padding:28px 12px;color:var(--text3);font-size:12px}

.pl{color:var(--low);background:var(--lowbg);border:1px solid var(--lowborder)}
.pm{color:var(--med);background:var(--medbg);border:1px solid var(--medborder)}
.ph{color:var(--high);background:var(--highbg);border:1px solid var(--highborder)}
.pc{color:var(--crit);background:var(--critbg);border:1px solid var(--critborder)}

.status-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.sb-backlog{background:#f1f5f9;color:#475569}
.sb-progress{background:#dbeafe;color:#1d4ed8}
.sb-review{background:#fef3c7;color:#92400e}
.sb-done{background:#dcfce7;color:#15803d}

.list-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-sel{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text);background:var(--card);cursor:pointer;outline:none;transition:border-color .15s}
.filter-sel:focus{border-color:var(--blue2)}
.list-table{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.tbl-head{display:grid;grid-template-columns:3fr 1fr 1fr 1.2fr 1.2fr 80px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.tbl-row{display:grid;grid-template-columns:3fr 1fr 1fr 1.2fr 1.2fr 80px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background .1s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:#f8faff}
.tbl-row-actions{display:flex;gap:6px}
.prio-bar{width:3px;height:34px;border-radius:2px;flex-shrink:0}
.row-title-wrap{display:flex;align-items:center;gap:10px}

.users-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.user-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);transition:all .15s}
.user-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.user-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.user-name{font-weight:600;font-size:14px;color:var(--text)}
.user-role{font-size:12px;color:var(--text3);margin-top:1px}
.user-email{font-size:11px;color:var(--blue);margin-top:1px}
.user-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.user-stat{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px}
.user-stat-n{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
.user-stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

.overlay{display:none;position:fixed;inset:0;background:rgba(10,20,45,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--radius-lg);width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(10,20,45,.25)}
.modal-sm{width:420px}
.modal-head{padding:22px 24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.modal-head-title{font-size:16px;font-weight:600}
.modal-close{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:18px;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .1s;line-height:1}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}

.form-grid{display:grid;gap:14px;margin-bottom:14px}
.form-2{grid-template-columns:1fr 1fr}
.form-grp{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.form-input{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.form-input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.form-input:disabled{opacity:.45;cursor:not-allowed;background:var(--bg)}
textarea.form-input{resize:vertical;min-height:84px}
.ft{display:inline-flex;align-items:center;background:#ede9fe;color:#7c3aed;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;letter-spacing:.3px}

/* Loading screen */
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-logo{width:56px;height:56px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:#fff;margin-bottom:20px}
.loading-title{color:#fff;font-size:18px;font-weight:600;margin-bottom:8px}
.loading-sub{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:32px}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:var(--blue2);border-radius:2px;animation:load 1.5s ease-in-out infinite}
@keyframes load{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:900px){
  .sidebar{width:56px;min-width:56px}
  .brand-name,.brand-ver,.nav-label,.nav-group,.coming-tag{display:none}
  .nav-item{justify-content:center;padding:10px}
  .nav-item.active::before{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .users-grid{grid-template-columns:1fr 1fr}
  .tbl-head,.tbl-row{grid-template-columns:3fr 1fr 1fr 80px}
  .tbl-head span:nth-child(4),.tbl-row>div:nth-child(4),
  .tbl-head span:nth-child(5),.tbl-row>div:nth-child(5){display:none}
}
@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr}
  .users-grid{grid-template-columns:1fr}
  .form-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">H</div>
  <div class="loading-title">Hunter Task System</div>
  <div class="loading-sub">Conectando ao banco de dados...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="app">
<aside class="sidebar">
  <div class="sidebar-head">
    <div class="brand">
      <div class="brand-icon">H</div>
      <div>
        <div class="brand-name">Hunter</div>
        <div class="brand-ver">TASK SYSTEM v1.0</div>
      </div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-group">Principal</div>
    <button class="nav-item active" onclick="goTo('dashboard',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-item" onclick="goTo('kanban',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="2" width="4" height="12" rx="1"/><rect x="6" y="2" width="4" height="8" rx="1"/><rect x="11" y="2" width="4" height="10" rx="1"/></svg>
      <span class="nav-label">Kanban</span>
    </button>
    <button class="nav-item" onclick="goTo('list',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
      <span class="nav-label">Lista</span>
    </button>
    <button class="nav-item" onclick="goTo('users',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="5.5" r="2.8"/><path d="M1 14.5c0-3 2.2-5 5-5s5 2 5 5"/><circle cx="13" cy="5.5" r="2"/><path d="M15 14.5c0-2-1-3.2-2-3.8"/></svg>
      <span class="nav-label">Usuários</span>
    </button>
    <div class="nav-group" style="margin-top:10px">Em breve</div>
    <button class="nav-item disabled">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 1.5l1.8 3.6 4 .6-2.9 2.8.7 4L8 10.3l-3.6 1.7.7-4L2.2 5.7l4-.6z"/></svg>
      <span class="nav-label">Análise de Risco</span>
      <span class="coming-tag">breve</span>
    </button>
    <button class="nav-item disabled">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="12" height="10" rx="1.2"/><path d="M5 3V2M11 3V2M2 7h12"/></svg>
      <span class="nav-label">CRM Hunter</span>
      <span class="coming-tag">breve</span>
    </button>
    <button class="nav-item disabled">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 8h3.5l1.5-6 2.5 12 1.5-6H14"/></svg>
      <span class="nav-label">Relatórios</span>
      <span class="coming-tag">breve</span>
    </button>
  </nav>
  <div class="nav-foot">
    <button class="nav-item" onclick="openOverlay('overlay-user')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="5" r="3"/><path d="M2 14.5c0-3 2.7-5.5 6-5.5s6 2.5 6 5.5"/></svg>
      <span class="nav-label">Novo usuário</span>
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-title" id="page-title">Dashboard</span>
      <span class="mvp-badge">MVP</span>
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Sincronizado</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-secondary btn-sm" onclick="openOverlay('overlay-user')">+ Usuário</button>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc,
  onSnapshot, addDoc, setDoc, deleteDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─── FIREBASE CONFIG ─────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyB2xpm9C3sEFTwbe517zhyzldnSqY3GX3Y",
  authDomain: "hunter-task-sustem.firebaseapp.com",
  projectId: "hunter-task-sustem",
  storageBucket: "hunter-task-sustem.firebasestorage.app",
  messagingSenderId: "1000427972872",
  appId: "1:1000427972872:web:3e4753e3d3a94df02fa4bd"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const AVATAR_COLORS=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4','#84cc16','#f97316','#6366f1'];
function avatarColor(name){let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[Math.abs(h)]}
function initials(name){return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function fmtDate(d){if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y.slice(2)}`}
function isOverdue(t){return t.dead&&new Date(t.dead)<new Date()&&t.status!=='Concluído'}
function prioClass(p){return{Baixa:'pl',Média:'pm',Alta:'ph',Crítica:'pc'}[p]||'pl'}
function prioColor(p){return{Baixa:'#22c55e',Média:'#f59e0b',Alta:'#f97316',Crítica:'#ef4444'}[p]||'#22c55e'}
function statusClass(s){return{Backlog:'sb-backlog','Em andamento':'sb-progress','Em revisão':'sb-review','Concluído':'sb-done'}[s]||'sb-backlog'}
function statusColor(s){return{Backlog:'#94a3b8','Em andamento':'#3b82f6','Em revisão':'#f59e0b','Concluído':'#22c55e'}[s]||'#94a3b8'}
const prioOrder={Baixa:0,Média:1,Alta:2,Crítica:3};

// ─── STATE ────────────────────────────────────────────────────────────────────
let S = { view:'dashboard', editId:null, dragId:null, users:[], tasks:[] };

function setSyncing(state){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(state==='syncing'){dot.className='sync-dot syncing';lbl.textContent='Sincronizando...'}
  else if(state==='ok'){dot.className='sync-dot';lbl.textContent='Sincronizado'}
  else{dot.className='sync-dot error';lbl.textContent='Erro de conexão'}
}

// ─── REALTIME LISTENERS ───────────────────────────────────────────────────────
let loaded = {users:false, tasks:false};
function checkLoaded(){
  if(loaded.users && loaded.tasks){
    document.getElementById('loading-screen').classList.add('hidden');
    render();
  }
}

onSnapshot(collection(db,'users'), snap => {
  S.users = snap.docs.map(d=>({id:d.id,...d.data()}));
  loaded.users = true;
  checkLoaded();
  render();
  setSyncing('ok');
}, ()=>setSyncing('error'));

onSnapshot(query(collection(db,'tasks')), snap => {
  S.tasks = snap.docs.map(d=>({id:d.id,...d.data()}));
  loaded.tasks = true;
  checkLoaded();
  render();
  setSyncing('ok');
}, ()=>setSyncing('error'));

// ─── NAV ─────────────────────────────────────────────────────────────────────
window.goTo = function(view, btn){
  S.view=view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  ['dashboard','kanban','list','users'].forEach(v=>{
    document.getElementById('view-'+v).style.display=v===view?'block':'none';
  });
  const titles={dashboard:'Dashboard',kanban:'Quadro Kanban',list:'Lista de Tarefas',users:'Colaboradores'};
  document.getElementById('page-title').textContent=titles[view]||view;
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  renderDash(); renderKanban(); renderList(); renderUsers(); populateUserSelects();
}

function renderDash(){
  const T=S.tasks;
  const late=T.filter(t=>isOverdue(t)).length;
  const prog=T.filter(t=>t.status==='Em andamento').length;
  const done=T.filter(t=>t.status==='Concluído').length;
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat"><div class="stat-icon" style="background:#eff6ff"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#3b82f6" stroke-width="1.6"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg></div><div class="stat-label">Total de tarefas</div><div class="stat-val">${T.length}</div><div class="stat-sub">em todos os status</div></div>
    <div class="stat stat-crit"><div class="stat-icon" style="background:#fee2e2"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#dc2626" stroke-width="1.6"><circle cx="8" cy="8" r="7"/><line x1="8" y1="4" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".8" fill="#dc2626"/></svg></div><div class="stat-label">Atrasadas</div><div class="stat-val">${late}</div><div class="stat-sub">passaram do prazo</div></div>
    <div class="stat"><div class="stat-icon" style="background:#eff6ff"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#3b82f6" stroke-width="1.6"><polyline points="2,8 6,12 14,4"/></svg></div><div class="stat-label">Em andamento</div><div class="stat-val">${prog}</div><div class="stat-sub">sendo executadas agora</div></div>
    <div class="stat stat-ok"><div class="stat-icon" style="background:#dcfce7"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="#16a34a" stroke-width="1.6"><polyline points="2,9 6,13 14,3"/></svg></div><div class="stat-label">Concluídas</div><div class="stat-val">${done}</div><div class="stat-sub">finalizadas com sucesso</div></div>`;

  const statuses=['Backlog','Em andamento','Em revisão','Concluído'];
  document.getElementById('chart-status').innerHTML=statuses.map(s=>{
    const n=T.filter(t=>t.status===s).length;
    const pct=T.length?Math.round(n/T.length*100):0;
    return`<div class="bar-row"><span class="bar-lbl">${s}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${statusColor(s)}"></div></div><span class="bar-n">${n}</span></div>`;
  }).join('');

  document.getElementById('chart-collab').innerHTML=S.users.length
    ? S.users.map(u=>{
        const n=T.filter(t=>t.user===u.id).length;
        const pct=T.length?Math.round(n/T.length*100):0;
        return`<div class="bar-row"><span class="bar-lbl">${u.name.split(' ')[0]}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${avatarColor(u.name)}"></div></div><span class="bar-n">${n}</span></div>`;
      }).join('')
    : '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Nenhum colaborador cadastrado</div>';

  document.getElementById('chart-prio').innerHTML=['Baixa','Média','Alta','Crítica'].map(p=>{
    const n=T.filter(t=>t.prio===p).length;
    return`<div class="prio-chip"><div class="prio-dot" style="background:${prioColor(p)}"></div><div><div class="prio-chip-n">${n}</div><div class="prio-chip-l">${p}</div></div></div>`;
  }).join('');
}

const COLS=[
  {id:'Backlog',color:'#94a3b8'},
  {id:'Em andamento',color:'#3b82f6'},
  {id:'Em revisão',color:'#f59e0b'},
  {id:'Concluído',color:'#22c55e'},
];

function avatarHtml(userId,size='sm'){
  const u=S.users.find(u=>u.id===userId);
  if(!u)return`<span style="font-size:11px;color:var(--text3)">—</span>`;
  return`<div class="avatar avatar-${size}" style="background:${avatarColor(u.name)}">${initials(u.name)}</div>`;
}

function taskCardHtml(t){
  const over=isOverdue(t);
  const u=S.users.find(u=>u.id===t.user);
  return`<div class="task-card" id="card-${t.id}" draggable="true"
    ondragstart="S.dragId='${t.id}'"
    ondragover="event.preventDefault()"
    ondrop="dropOnCard(event,'${t.id}')">
    <div class="task-card-actions">
      <button class="card-act-btn" onclick="editTask('${t.id}')" title="Editar">✏</button>
      <button class="card-act-btn del" onclick="delTask('${t.id}')" title="Excluir">✕</button>
    </div>
    <div class="task-prio-badge ${prioClass(t.prio)}">${t.prio}</div>
    <div class="task-title">${t.title}</div>
    ${t.desc?`<div class="task-desc">${t.desc}</div>`:''}
    <div class="task-foot">
      <div class="task-assignee">
        ${avatarHtml(t.user,'sm')}
        <span style="font-size:11px;color:var(--text3)">${u?u.name.split(' ')[0]:'—'}</span>
      </div>
      <div class="task-due${over?' overdue':''}">${over?'⚠ ':''}${fmtDate(t.dead)}</div>
    </div>
  </div>`;
}

function renderKanban(){
  document.getElementById('kanban-board').innerHTML=COLS.map(col=>{
    const tasks=S.tasks.filter(t=>t.status===col.id);
    return`<div class="kanban-col">
      <div class="col-head">
        <div class="col-head-l"><div class="col-pip" style="background:${col.color}"></div>${col.id}</div>
        <span class="col-cnt">${tasks.length}</span>
      </div>
      <div class="col-cards"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="dropOnCol(event,'${col.id}')">
        ${tasks.length?tasks.map(taskCardHtml).join(''):`<div class="col-empty">Nenhuma tarefa</div>`}
      </div>
      <button class="col-add" onclick="newTaskInCol('${col.id}')">+ Adicionar tarefa</button>
    </div>`;
  }).join('');
}

window.dropOnCol = async function(e, status){
  e.stopPropagation();
  document.querySelectorAll('.col-cards').forEach(c=>c.classList.remove('drag-over'));
  if(S.dragId){
    setSyncing('syncing');
    await setDoc(doc(db,'tasks',S.dragId),{status},{merge:true});
    S.dragId=null;
  }
}
window.dropOnCard = async function(e, targetId){
  e.stopPropagation();
  if(S.dragId && S.dragId!==targetId){
    const tgt=S.tasks.find(t=>t.id===targetId);
    if(tgt){
      setSyncing('syncing');
      await setDoc(doc(db,'tasks',S.dragId),{status:tgt.status},{merge:true});
    }
  }
  S.dragId=null;
}

function renderList(){
  let tasks=[...S.tasks];
  const fu=document.getElementById('f-user').value;
  const fs=document.getElementById('f-status').value;
  const fp=document.getElementById('f-prio').value;
  const fsort=document.getElementById('f-sort').value;
  if(fu)tasks=tasks.filter(t=>t.user===fu);
  if(fs)tasks=tasks.filter(t=>t.status===fs);
  if(fp)tasks=tasks.filter(t=>t.prio===fp);
  if(fsort==='deadline')tasks.sort((a,b)=>new Date(a.dead||'9999')-new Date(b.dead||'9999'));
  else if(fsort==='title')tasks.sort((a,b)=>a.title.localeCompare(b.title));
  else if(fsort==='prio')tasks.sort((a,b)=>(prioOrder[b.prio]||0)-(prioOrder[a.prio]||0));
  document.getElementById('list-body').innerHTML=tasks.length?tasks.map(t=>{
    const over=isOverdue(t);
    const usr=S.users.find(u=>u.id===t.user);
    return`<div class="tbl-row">
      <div class="row-title-wrap">
        <div class="prio-bar" style="background:${prioColor(t.prio)}"></div>
        <div><div style="font-weight:500;font-size:13px">${t.title}</div>${t.desc?`<div style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px">${t.desc}</div>`:''}</div>
      </div>
      <div><span class="status-badge ${statusClass(t.status)}">${t.status}</span></div>
      <div><span class="task-prio-badge ${prioClass(t.prio)}" style="font-size:10px;padding:2px 7px">${t.prio}</span></div>
      <div style="display:flex;align-items:center;gap:6px">${avatarHtml(t.user,'sm')}<span style="font-size:12px">${usr?usr.name.split(' ')[0]:'—'}</span></div>
      <div class="task-due${over?' overdue':''}" style="font-size:12px">${over?'⚠ ':''}${fmtDate(t.dead)}</div>
      <div class="tbl-row-actions">
        <button class="card-act-btn" onclick="editTask('${t.id}')">✏</button>
        <button class="card-act-btn del" onclick="delTask('${t.id}')">✕</button>
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:48px;color:var(--text3);font-size:13px">Nenhuma tarefa encontrada com os filtros selecionados</div>`;
}

function renderUsers(){
  document.getElementById('users-grid').innerHTML=S.users.length
    ? S.users.map(u=>{
        const ut=S.tasks.filter(t=>t.user===u.id);
        const done=ut.filter(t=>t.status==='Concluído').length;
        const late=ut.filter(t=>isOverdue(t)).length;
        const prog=ut.filter(t=>t.status==='Em andamento').length;
        return`<div class="user-card">
          <div class="user-head">
            <div class="avatar avatar-lg" style="background:${avatarColor(u.name)}">${initials(u.name)}</div>
            <div>
              <div class="user-name">${u.name}</div>
              <div class="user-role">${u.role||'—'}</div>
              ${u.email?`<div class="user-email">${u.email}</div>`:''}
            </div>
          </div>
          <div class="user-stats-grid">
            <div class="user-stat"><div class="user-stat-n">${ut.length}</div><div class="user-stat-l">Tarefas</div></div>
            <div class="user-stat"><div class="user-stat-n">${done}</div><div class="user-stat-l">Concluídas</div></div>
            <div class="user-stat"><div class="user-stat-n" style="${late?'color:var(--crit)':''}">${late}</div><div class="user-stat-l">Atrasadas</div></div>
            <div class="user-stat"><div class="user-stat-n">${prog}</div><div class="user-stat-l">Andamento</div></div>
          </div>
        </div>`;
      }).join('')
    : `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text3);font-size:13px">Nenhum colaborador cadastrado. Clique em "+ Novo usuário" para começar.</div>`;
}

function populateUserSelects(){
  const opts='<option value="">Selecione...</option>'+S.users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  document.getElementById('t-user').innerHTML=opts;
  const fu=document.getElementById('f-user');
  const prev=fu.value;
  fu.innerHTML='<option value="">Todos os responsáveis</option>'+S.users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  fu.value=prev;
}

// ─── TASK CRUD ────────────────────────────────────────────────────────────────
window.newTask = function(){S.editId=null;resetTaskForm();openOverlay('overlay-task')}
window.newTaskInCol = function(status){S.editId=null;resetTaskForm();document.getElementById('t-status').value=status;openOverlay('overlay-task')}

function resetTaskForm(){
  document.getElementById('edit-id').value='';
  document.getElementById('modal-task-label').textContent='Nova tarefa';
  ['t-title','t-desc','t-start','t-dead'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-status').value='Backlog';
  document.getElementById('t-prio').value='Média';
  populateUserSelects();
  document.getElementById('t-user').value='';
}

window.editTask = function(id){
  S.editId=id;
  const t=S.tasks.find(t=>t.id===id);
  if(!t)return;
  populateUserSelects();
  document.getElementById('edit-id').value=id;
  document.getElementById('modal-task-label').textContent='Editar tarefa';
  document.getElementById('t-title').value=t.title;
  document.getElementById('t-desc').value=t.desc||'';
  document.getElementById('t-status').value=t.status;
  document.getElementById('t-prio').value=t.prio;
  document.getElementById('t-start').value=t.start||'';
  document.getElementById('t-dead').value=t.dead||'';
  setTimeout(()=>document.getElementById('t-user').value=t.user||'',10);
  openOverlay('overlay-task');
}

window.saveTask = async function(){
  const title=document.getElementById('t-title').value.trim();
  if(!title){alert('O título é obrigatório');return;}
  const id=document.getElementById('edit-id').value;
  const task={
    title,
    desc:document.getElementById('t-desc').value.trim(),
    user:document.getElementById('t-user').value,
    status:document.getElementById('t-status').value,
    prio:document.getElementById('t-prio').value,
    start:document.getElementById('t-start').value,
    dead:document.getElementById('t-dead').value,
    updatedAt: new Date().toISOString(),
  };
  setSyncing('syncing');
  if(id){ await setDoc(doc(db,'tasks',id), task, {merge:true}); }
  else { task.createdAt=new Date().toISOString(); await addDoc(collection(db,'tasks'), task); }
  closeOverlay('overlay-task');
  S.editId=null;
}

window.delTask = async function(id){
  if(!confirm('Excluir esta tarefa permanentemente?'))return;
  setSyncing('syncing');
  await deleteDoc(doc(db,'tasks',id));
}

// ─── USER CRUD ────────────────────────────────────────────────────────────────
window.saveUser = async function(){
  const name=document.getElementById('u-name').value.trim();
  if(!name){alert('O nome é obrigatório');return;}
  const user={
    name,
    role:document.getElementById('u-role').value.trim(),
    email:document.getElementById('u-email').value.trim(),
    createdAt:new Date().toISOString(),
  };
  setSyncing('syncing');
  await addDoc(collection(db,'users'), user);
  ['u-name','u-role','u-email'].forEach(id=>document.getElementById(id).value='');
  closeOverlay('overlay-user');
}

// ─── OVERLAYS ─────────────────────────────────────────────────────────────────
window.openOverlay = function(id){document.getElementById(id).classList.add('open')}
window.closeOverlay = function(id){document.getElementById(id).classList.remove('open');S.editId=null}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',function(e){if(e.target===this){this.classList.remove('open');S.editId=null}})
});

window.S = S;
window.dropOnCol = window.dropOnCol;

</script>
</body>
